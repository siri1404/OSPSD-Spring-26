[project]
name = "cloud-storage-service-api-client"
version = "1.0.0"
description = "A client library for accessing Cloud Storage Service API"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.23.0,<0.29.0",
    "attrs>=22.2.0",
    "python-dateutil>=2.8.0,<3.0.0",
]

[tool.poetry]
name = "cloud-storage-service-api-client"
version = "1.0.0"
description = "A client library for accessing Cloud Storage Service API"
authors = []
readme = "README.md"
packages = [
    { include = "cloud_storage_service_api_client" },
]
include = ["cloud_storage_service_api_client/py.typed"]

[tool.poetry.dependencies]
python = "^3.10"
httpx = ">=0.23.0,<0.29.0"
attrs = ">=22.2.0"
python-dateutil = "^2.8.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
# Local ruff config removed; linting is centralized in the repository root `pyproject.toml`.
# The autogenerated client is handled by the root config and by mypy ignores already
# present under `[[tool.mypy.overrides]]`.
