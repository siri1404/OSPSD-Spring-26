version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: "Install UV"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version
      - run:
          name: "Create Venv & Install Dependencies"
          command: |
            uv venv --python 3.12
            source .venv/bin/activate
            uv sync --all-packages --group dev --verbose
      - run:
          name: "Verify Installation"
          command: |
            source .venv/bin/activate
            ruff --version
            pytest --version
            mypy --version
      - persist_to_workspace:
          root: .
          paths:
            - .

  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Ruff Check"
          command: |
            source .venv/bin/activate
            ruff check .
      - run:
          name: "Ruff Format Check"
          command: |
            source .venv/bin/activate
            ruff format --check .

  typecheck:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Mypy Strict"
          command: |
            source .venv/bin/activate
            mypy .

  unit_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Run Unit Tests"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit
            pytest components/ \
              --cov=components/ \
              --cov-report=xml \
              --cov-report=html:coverage-html \
              --cov-report=term \
              --junitxml=test-results/unit/junit.xml \
              --cov-fail-under=85
      - store_test_results:
          path: test-results/unit
      - store_artifacts:
          path: coverage.xml
      - store_artifacts:
          path: coverage-html
          destination: coverage
      - store_artifacts:
          path: test-results/unit

  integration_test:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Run Integration Tests"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration
            pytest tests/integration/ \
              --junitxml=test-results/integration/junit.xml \
              -v \
              --no-cov
      - store_test_results:
          path: test-results/integration
      - store_artifacts:
          path: test-results/integration

  mkdocs_build:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "MkDocs Build"
          command: |
            source .venv/bin/activate
            mkdocs build 
      - store_artifacts:
          path: site
          destination: docs-site

  terraform_plan:
    docker:
      - image: hashicorp/terraform:1.8
    working_directory: ~/project/infrastructure
    steps:
      - checkout:
          path: ~/project
      - run:
          name: "Terraform Init"
          command: terraform init -input=false
      - run:
          name: "Terraform Format Check"
          command: terraform fmt -check -recursive
      - run:
          name: "Terraform Validate"
          command: terraform validate
      - run:
          name: "Terraform Plan"
          command: terraform plan -input=false -out=tfplan
      - persist_to_workspace:
          root: ~/project
          paths:
            - infrastructure/tfplan
            - infrastructure/.terraform
            - infrastructure/.terraform.lock.hcl

  terraform_apply:
    docker:
      - image: hashicorp/terraform:1.8
    working_directory: ~/project/infrastructure
    steps:
      - checkout:
          path: ~/project
      - attach_workspace:
          at: ~/project
      - run:
          name: "Terraform Init"
          command: terraform init -input=false
      - run:
          name: "Import existing Render services if not in state"
          command: |
            if ! terraform state list | grep -q "render_web_service.cloud_storage"; then
              echo "cloud_storage not in state, importing..."
              terraform import render_web_service.cloud_storage $RENDER_SERVICE_ID
            else
              echo "cloud_storage already in state, skipping"
            fi
      - run:
          name: "Terraform Plan (post-import)"
          command: terraform plan -input=false -out=tfplan
      - run:
          name: "Terraform Apply"
          command: terraform apply -input=false -auto-approve tfplan
      - run:
          name: "Export STAGING_SERVICE_URL for downstream jobs"
          command: |
            mkdir -p ~/project/deploy-output
            terraform output -raw service_url > ~/project/deploy-output/staging_service_url.txt
            echo "Deployed: $(cat ~/project/deploy-output/staging_service_url.txt)"
      - persist_to_workspace:
          root: ~/project
          paths:
            - deploy-output/staging_service_url.txt

  post_deploy_e2e:
    docker:
      - image: cimg/python:3.12
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Brief settle after deploy verification"
          command: |
            echo "Deploy verified by check_render_deploy. Brief settle..."
            sleep 10
      - run:
          name: "Run E2E against deployed service"
          command: |
            source .venv/bin/activate
            : "${RENDER_SERVICE_URL:?RENDER_SERVICE_URL must be set in render-deploy context}"
            : "${DEV_AUTH_TOKEN:?DEV_AUTH_TOKEN must be set in render-deploy context}"
            : "${GCS_BUCKET_NAME:?GCS_BUCKET_NAME must be set in render-deploy context}"
            export STAGING_SERVICE_URL="$RENDER_SERVICE_URL"
            echo "Running e2e against: $STAGING_SERVICE_URL"
            echo "Using bucket: $GCS_BUCKET_NAME"
            mkdir -p test-results/post-deploy-e2e
            pytest tests/e2e/test_e2e_workflow.py \
              --junitxml=test-results/post-deploy-e2e/junit.xml \
              -v \
              --no-cov
      - store_test_results:
          path: test-results/post-deploy-e2e
      - store_artifacts:
          path: test-results/post-deploy-e2e

  check_render_deploy:
    docker:
      - image: cimg/python:3.12
    steps:
      - run:
          name: "Wait for and Check Render Deployment"
          command: |
            if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
              echo "RENDER_API_KEY and RENDER_SERVICE_ID must be defined in CircleCI project settings." >&2
              exit 1
            fi
            echo "Polling Render API for latest deploy status..."
            SERVICE_ENDPOINT="https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=1"
            for i in $(seq 1 48); do
              DEPLOY_JSON=$(curl -s -H "Authorization: Bearer ${RENDER_API_KEY}" "$SERVICE_ENDPOINT")
              echo "Deploy JSON: $DEPLOY_JSON"
              DEPLOY_ID=$(echo "$DEPLOY_JSON" | python3 -c "import sys, json; data=json.load(sys.stdin); d = data['deploys'][0] if isinstance(data, dict) and 'deploys' in data and data['deploys'] else (data[0]['deploy'] if isinstance(data, list) and len(data) > 0 and 'deploy' in data[0] else None); print(d['id'] if d and 'id' in d else 'none')")
              STATUS=$(echo "$DEPLOY_JSON" | python3 -c "import sys, json; data=json.load(sys.stdin); d = data['deploys'][0] if isinstance(data, dict) and 'deploys' in data and data['deploys'] else (data[0]['deploy'] if isinstance(data, list) and len(data) > 0 and 'deploy' in data[0] else None); print(d['status'] if d and 'status' in d else 'none')")
              echo "Attempt $i: Deploy $DEPLOY_ID status is $STATUS"
              if [ "$DEPLOY_ID" = "none" ]; then
                echo "No deploys found or unexpected API response. Failing."
                exit 1
              fi
              if [ "$STATUS" = "live" ] || [ "$STATUS" = "succeeded" ]; then
                echo "Render deployment succeeded!"
                exit 0
              elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
                echo "Render deployment failed: $STATUS" >&2
                exit 1
              fi
              sleep 10
            done
            echo "Timed out waiting for Render deployment to complete." >&2
            exit 1

workflows:
  build_and_test:
    jobs:
      - build:
          filters:
            branches:
              ignore:
                - main
      - lint:
          requires:
            - build
      - typecheck:
          requires:
            - build
      - unit_test:
          requires:
            - build
      - integration_test:
          # No context needed: all integration tests run with mocked AI/chat/storage
          # clients at the FastAPI DI boundary. See tests/integration/conftest.py
          # docstring for the mocking strategy.
          requires:
            - unit_test
      - mkdocs_build:
          requires:
            - build
      - terraform_plan:
          requires:
            - lint
          filters:
            branches:
              ignore:
                - main
      # ────────────────────────────────────────────────────────────────
      # DISABLED: Terraform apply is broken on Render free tier.
      #
      # The render-oss/render v1.8.0 provider (the latest released)
      # sends `maintenance_mode` in every update payload. Render's
      # free-tier API rejects updates that touch that field. There is
      # no provider version that omits it on free tier.
      #
      # Code deploys continue to flow via Render's auto_deploy=true.
      # post_deploy_e2e is rewired below to validate the live deploy
      # without requiring terraform_apply.
      #
      # Re-enable terraform_apply when:
      #   - The project moves to a paid Render tier, OR
      #   - A new provider version omits maintenance_mode on free tier.
      # ────────────────────────────────────────────────────────────────
      # - terraform_apply:
      #     requires:
      #       - terraform_plan
      #       - integration_test
      #     filters:
      #       branches:
      #         only:
      #           - hw-3
      - check_render_deploy:
          context: render-deploy
          requires:
            - build
            - integration_test
          filters:
            branches:
              only:
                - hw-3
      - post_deploy_e2e:
          context: render-deploy
          requires:
            - check_render_deploy
          filters:
            branches:
              only:
                - hw-3
