services:
  - type: web
    name: cloud-storage-service
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    numInstances: 1
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: GCP_SERVICE_KEY
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://cloud-storage-service-mcni.onrender.com/auth/callback
      # DEV_AUTH_TOKEN and DEV_ACCESS_TOKEN should NOT be set in production
      # These are only for local development/testing
      # - key: DEV_AUTH_TOKEN
      #   value: your-dev-token-here
      # - key: DEV_ACCESS_TOKEN
      #   value: your-dev-token-here
